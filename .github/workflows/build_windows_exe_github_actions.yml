name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'hacker_points_exe_ready.py'
      - '.github/workflows/build_windows_exe.yml'
      - 'requirements.txt'
      - 'static/**'
      - 'house_points.csv'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --noconsole --name HackerHousePoints hacker_points_exe_ready.py

      - name: Stage package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/HackerHousePoints.exe release/
          if (Test-Path house_points.csv) {
            Copy-Item house_points.csv release/
          }
          if (Test-Path static) {
            Copy-Item static release/static -Recurse
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HackerHousePoints-Windows
          path: release/**
